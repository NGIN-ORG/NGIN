name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "Dependencies/NGIN/**"
      - "Examples/**"
      - "Packages/**"
      - "Tools/NGIN.CLI/**"
      - "*.ngin"
      - "*.nginproj"
      - "*.nginpkg"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "Dependencies/NGIN/**"
      - "Examples/**"
      - "Packages/**"
      - "Tools/NGIN.CLI/**"
      - "*.ngin"
      - "*.nginproj"
      - "*.nginpkg"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Native workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build

      - name: Ensure LLVM libclang
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmRoot = "C:\Program Files\LLVM"
          $required = @(
            "$llvmRoot\include\clang-c\Index.h",
            "$llvmRoot\lib\libclang.lib",
            "$llvmRoot\bin\libclang.dll"
          )
          if ($required | Where-Object { -not (Test-Path $_) }) {
            choco upgrade llvm --version=18.1.8 --allow-downgrade -y
          }
          "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          "LLVM_INSTALL_DIR=C:\Program Files\LLVM" >> $env:GITHUB_ENV
          "LLVM_DIR=C:\Program Files\LLVM\lib\cmake\llvm" >> $env:GITHUB_ENV
          "Clang_DIR=C:\Program Files\LLVM\lib\cmake\clang" >> $env:GITHUB_ENV
          "LIBCLANG_INCLUDE_DIR=C:\Program Files\LLVM\include" >> $env:GITHUB_ENV
          "LIBCLANG_LIBRARY=C:\Program Files\LLVM\lib\libclang.lib" >> $env:GITHUB_ENV
          "CMAKE_PREFIX_PATH=C:\Program Files\LLVM" >> $env:GITHUB_ENV

      - name: Verify libclang
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          clang --version
          if (-not (Test-Path "C:\Program Files\LLVM\include\clang-c\Index.h")) { throw "Missing clang-c\Index.h" }
          if (-not (Test-Path "C:\Program Files\LLVM\lib\libclang.lib")) { throw "Missing libclang.lib" }
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) { throw "Missing libclang.dll" }

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure workspace
        run: cmake --preset dev

      - name: Build native CLI
        run: cmake --build build/dev --target ngin_cli

      - name: Build CLI tests
        run: cmake --build build/dev --target NGINCliTests

      - name: Run CLI tests
        run: ctest --test-dir build/dev --output-on-failure

      - name: Run workspace workflow
        run: cmake --build build/dev --target ngin.workflow

      - name: Install WiX packaging tool
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --tool-path "$PWD/.tools" wix --version 4.0.6
          & "$PWD/.tools/wix.exe" extension add --global WixToolset.UI.wixext/4.0.6
          "$PWD/.tools" >> $env:GITHUB_PATH

      - name: Fetch host build tools for packaging
        shell: bash
        run: Tools/scripts/fetch-bundled-tools.sh

      - name: Smoke-test Linux CLI packages
        if: runner.os == 'Linux'
        run: |
          ./build/dev/Tools/NGIN.CLI/ngin publish linux-tgz --project Tools/NGIN.CLI/NGIN.CLI.nginproj --profile Release.Linux --output build/packaging-smoke/linux
          ./build/dev/Tools/NGIN.CLI/ngin publish linux-deb --project Tools/NGIN.CLI/NGIN.CLI.nginproj --profile Release.Linux --output build/packaging-smoke/linux
          tar -tzf dist/ngin-0.1.0-linux-x86_64.tgz | grep 'bin/ngin'
          if tar -tzf dist/ngin-0.1.0-linux-x86_64.tgz | grep -q 'share/ngin/tools/cmake'; then exit 1; fi
          dpkg-deb --contents dist/ngin-0.1.0-linux-x86_64.deb | grep 'usr/bin/ngin'
          archive_root=$(mktemp -d)
          deb_root=$(mktemp -d)
          tar -xzf dist/ngin-0.1.0-linux-x86_64.tgz -C "$archive_root"
          "$archive_root/ngin-0.1.0-linux-x86_64/bin/ngin" --version
          dpkg-deb --extract dist/ngin-0.1.0-linux-x86_64.deb "$deb_root"
          "$deb_root/usr/bin/ngin" --version

      - name: Smoke-test Windows CLI packages
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build/dev/Tools/NGIN.CLI/ngin.exe publish windows-zip --project Tools/NGIN.CLI/NGIN.CLI.nginproj --profile Release.Windows --output build/packaging-smoke/windows
          ./build/dev/Tools/NGIN.CLI/ngin.exe publish windows-msi --project Tools/NGIN.CLI/NGIN.CLI.nginproj --profile Release.Windows --output build/packaging-smoke/windows
          if (-not (Test-Path dist/ngin-0.1.0-windows-x86_64.zip)) { throw "Missing ZIP" }
          if (-not (Test-Path dist/ngin-0.1.0-windows-x86_64.msi)) { throw "Missing MSI" }
          $zipRoot = Join-Path $env:RUNNER_TEMP "ngin-cli-zip"
          Expand-Archive dist/ngin-0.1.0-windows-x86_64.zip $zipRoot
          & "$zipRoot/bin/ngin.exe" --version
          $msi = (Resolve-Path dist/ngin-0.1.0-windows-x86_64.msi).Path
          $install = Start-Process msiexec.exe -ArgumentList "/i", $msi, "/qn", "/norestart" -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "MSI installation failed: $($install.ExitCode)" }
          $installedCli = "C:\Program Files\NGIN\NGIN.CLI\bin\ngin.exe"
          & $installedCli --version
          $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if (-not $machinePath.Contains("C:\Program Files\NGIN\NGIN.CLI\bin")) { throw "MSI did not register ngin on PATH" }
          $uninstall = Start-Process msiexec.exe -ArgumentList "/x", $msi, "/qn", "/norestart" -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "MSI uninstall failed: $($uninstall.ExitCode)" }

      - name: Upload CTest logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ctest-logs-${{ matrix.os }}
          path: build/dev/Testing/Temporary/
          if-no-files-found: ignore
          retention-days: 14
