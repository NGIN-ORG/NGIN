name: Native Crypto CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/crypto-native-ci.yml"
      - "Dependencies/NGIN/NGIN.Base/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/crypto-native-ci.yml"
      - "Dependencies/NGIN/NGIN.Base/**"

permissions:
  contents: read

concurrency:
  group: crypto-native-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-crypto:
    name: Native crypto (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            provider: cng
            provider-option: NGIN_BASE_CRYPTO_WITH_CNG
            required-algorithms: random;sha256;hmac-sha256;pbkdf2-sha256;aes-256-gcm
          - os: macos-latest
            provider: apple
            provider-option: NGIN_BASE_CRYPTO_WITH_APPLE
            required-algorithms: random;sha256;hmac-sha256;pbkdf2-sha256

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure NGIN.Base native crypto
        run: >
          cmake
          -S Dependencies/NGIN/NGIN.Base
          -B build/ngin-base-crypto-native
          -DNGIN_BASE_BUILD_TESTS=ON
          -DNGIN_BASE_BUILD_EXAMPLES=OFF
          -DNGIN_BASE_BUILD_BENCHMARKS=OFF
          -D${{ matrix.provider-option }}=ON
          -DNGIN_BASE_CRYPTO_REQUIRE_PROVIDER=${{ matrix.provider }}
          -DNGIN_BASE_CRYPTO_REQUIRE_ALGORITHMS="${{ matrix.required-algorithms }}"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build native crypto tests
        run: >
          cmake
          --build build/ngin-base-crypto-native
          --config Release
          --target
          Crypto_BackendTests
          Crypto_ProviderConformanceTests
          Crypto_CertificateTests

      - name: Run native crypto tests
        run: >
          ctest
          --test-dir build/ngin-base-crypto-native
          --output-on-failure
          -C Release
          -R "^Base\\.Crypto\\.(Backend|ProviderConformance|Certificate)\\."

      - name: Upload CTest logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-crypto-ctest-logs-${{ matrix.os }}
          path: build/ngin-base-crypto-native/Testing/Temporary/
          if-no-files-found: ignore
          retention-days: 14
