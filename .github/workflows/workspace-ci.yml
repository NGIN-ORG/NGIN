name: Workspace CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: python -m py_compile tools/ngin-sync.py

      - name: Manifest and schema JSON parse check
        run: |
          python -c "import json, pathlib; [json.loads(pathlib.Path(p).read_text(encoding='utf-8')) for p in ('manifests/platform-release.json','manifests/platform-release.schema.json','manifests/components.schema.json')]; print('json-ok')"

      - name: Workspace doctor
        run: python tools/ngin-sync.py doctor

      - name: Configure workspace (CMake preset)
        run: cmake --preset dev

