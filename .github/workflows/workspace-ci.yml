name: Workspace CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure workspace (CMake preset)
        run: cmake --preset dev

      - name: Build native ngin CLI
        run: cmake --build build/dev --target ngin_cli

      - name: Run workspace workflow
        run: cmake --build build/dev --target ngin.workflow

      - name: Run workspace CLI tests
        run: ctest --test-dir build/dev --output-on-failure

      - name: Upload workspace stage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-stage-${{ matrix.os }}
          path: |
            build/dev/stage/
            build/dev/test-stage/
          if-no-files-found: error

      - name: Configure NGIN.Core
        run: cmake -S NGIN.Core -B build/ngin-core-ci -DNGIN_CORE_BUILD_TESTS=ON -DNGIN_CORE_BUILD_EXAMPLES=OFF

      - name: Build NGIN.Core tests
        run: cmake --build build/ngin-core-ci --config Release --target NGINCoreTests

      - name: Run NGIN.Core tests
        run: ctest --test-dir build/ngin-core-ci --output-on-failure -C Release
