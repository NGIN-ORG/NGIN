name: VS Code Extension CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vscode-extension-ci.yml"
      - "Tools/NGIN.VSCode/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/vscode-extension-ci.yml"
      - "Tools/NGIN.VSCode/**"

permissions:
  contents: read

concurrency:
  group: vscode-extension-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Tools/NGIN.VSCode

jobs:
  extension:
    name: Build, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Tools/NGIN.VSCode/package-lock.json

      - name: Install Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes xvfb

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: xvfb-run --auto-servernum npm run test:integration

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          VERSION="$(node -p "require('./package.json').version")"
          npx vsce package --out "artifacts/ngin-tools-${VERSION}.vsix"

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: ngin-tools-vsix
          path: Tools/NGIN.VSCode/artifacts/*.vsix
          if-no-files-found: error
          retention-days: 30
